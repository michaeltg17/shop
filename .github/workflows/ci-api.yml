name: ci-api

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'
      - '.github/workflows/cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

jobs:
  ci-api:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build CI Docker image
        uses: docker/build-push-action@v7
        with:
          context: api
          push: false
          load: true
          tags: shop-api-ci:latest
          cache-from: type=gha,scope=ci
          cache-to: type=gha,mode=max,scope=ci
          file: api/Dockerfile.ci

      - name: Run CI pipeline in Docker
        run: docker compose -f docker-compose.ci.yml run --rm ci

      - name: Validate Docker image builds
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: api
          push: false
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production

      - name: Metadata for Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/shop-api
          tags: |
            type=sha,prefix=,length=7
            type=raw,value=latest

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: api-test-results
          path: api/**/TestResults/
          retention-days: 30
