name: deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      tag:
        required: true
        type: string
    secrets:
      DEPLOY_PASSWORD:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to ${{ inputs.environment }}
        run: |
          set -e
          TAG=${{ inputs.tag }}
          TAG=${TAG:0:7}
          BODY="{\"project\":\"shop\",\"environment\":\"${{ inputs.environment }}\",\"tag\":\"${TAG}\"}"
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "\nHTTP_CODE: %{http_code}\n" \
            https://statikk.mooo.com/deploy
