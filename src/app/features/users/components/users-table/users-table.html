<app-base-table
  [columns]="columns"
  [dataSource]="dataSource"
  [selection]="selection"
  [filterValue]="filterValue"
  [cellTemplate]="cellTemplate"
  (add)="addUser()"
  (edit)="editUser()"
  (delete)="deleteUsers()"
  (rowClick)="viewUser($event)"
>
</app-base-table>

<ng-template #cellTemplate let-row let-column="column">
  <app-user-cell [value]="row[column.key]"></app-user-cell>
</ng-template>
