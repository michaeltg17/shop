<div class="toolbar">
  <mat-form-field appearance="outline">
    <mat-label>Search</mat-label>
    <input matInput [value]="filterValue()" (input)="onFilterChange($event)" placeholder="Search" />
  </mat-form-field>

  <button
    mat-icon-button
    (click)="add.emit()"
    [attr.aria-label]="addButtonLabel()"
    [disabled]="addButtonDisabled()"
  >
    <mat-icon>{{ addIcon() ?? 'add' }}</mat-icon>
  </button>

  <button
    mat-icon-button
    (click)="onEdit()"
    [attr.aria-label]="editButtonLabel()"
    [disabled]="editButtonDisabled() || selection().selected.length !== 1"
  >
    <mat-icon>{{ editIcon() ?? 'edit' }}</mat-icon>
  </button>

  <button
    mat-icon-button
    (click)="onDelete()"
    [attr.aria-label]="deleteButtonLabel()"
    [disabled]="deleteButtonDisabled() || selection().selected.length === 0"
  >
    <mat-icon>{{ deleteIcon() ?? 'delete' }}</mat-icon>
  </button>
</div>

<div class="table-wrap">
  <table mat-table [dataSource]="dataSource()" matSort class="table">
    <!-- Select Column -->
    <ng-container matColumnDef="select">
      <th mat-header-cell *matHeaderCellDef>
        <mat-checkbox
          [checked]="isAllSelected()"
          [indeterminate]="selection().hasValue() && !isAllSelected()"
          (change)="toggleAllRows()"
        ></mat-checkbox>
      </th>
      <td mat-cell *matCellDef="let row">
        <mat-checkbox
          (click)="$event.stopPropagation()"
          (change)="selection().toggle(row)"
          [checked]="selection().isSelected(row)"
        ></mat-checkbox>
      </td>
    </ng-container>

    <!-- Dynamic Columns -->
    @for (col of columns(); track col.key) {
    <ng-container [matColumnDef]="col.key">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col.label }}</th>
      <td mat-cell *matCellDef="let row">
        @if (cellTemplate()) {
        <ng-container
          [ngTemplateOutlet]="cellTemplate()!"
          [ngTemplateOutletContext]="{ $implicit: row, column: col }"
        ></ng-container>
        } @else { {{ row[col.key] }} }
      </td>
    </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()" (click)="rowClick.emit(row)"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="pageSizeOptions()" showFirstLastButtons></mat-paginator>
</div>
