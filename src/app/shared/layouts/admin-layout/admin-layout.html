<mat-toolbar>
  <span class="title">{{ titleService.getTitle() }}</span>
  <span class="spacer"></span>
  <button
    mat-button
    routerLink="users"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: false }"
  >
    Users
  </button>
  <button
    mat-button
    routerLink="products"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: false }"
  >
    Products
  </button>
  <button
    mat-button
    routerLink="carriers"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: false }"
  >
    Carriers
  </button>
  <button
    mat-button
    routerLink="user"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: false }"
  >
    User
  </button>
  <button mat-button routerLink="/shop/products" routerLinkActive="active">Shop</button>
  <button mat-button (click)="authService.logout()">Logout</button>
  <app-theme-selector></app-theme-selector>
</mat-toolbar>
<router-outlet></router-outlet>
