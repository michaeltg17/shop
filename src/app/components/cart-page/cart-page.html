<div class="cart-page">
  <h1>Shopping Cart</h1>

  <div *ngIf="cartItems.length === 0" class="empty-cart">
    <p>Your cart is empty</p>
    <a routerLink="/products" class="btn btn-primary">Continue Shopping</a>
  </div>

  <div *ngIf="cartItems.length > 0" class="cart-container">
    <div class="cart-items">
      <div *ngFor="let item of cartItems" class="cart-item">
        <div class="item-info">
          <h3>{{ item.product.title }}</h3>
          <p>{{ item.product.description }}</p>
          <p class="price">Price: ${{ item.product.price }}</p>
        </div>
        <div class="item-controls">
          <button (click)="updateQuantity(item, item.quantity - 1)" [disabled]="item.quantity <= 1" class="btn btn-outline">-</button>
          <span class="quantity">{{ item.quantity }}</span>
          <button (click)="updateQuantity(item, item.quantity + 1)" class="btn btn-outline">+</button>
          <button (click)="removeItem(item)" class="btn btn-danger">Remove</button>
        </div>
      </div>
    </div>

    <div class="cart-summary">
      <h2>Order Summary</h2>
      <div class="summary-row">
        <span>Subtotal:</span>
        <span>${{ subtotal }}</span>
      </div>
      <div class="summary-row">
        <span>Shipping:</span>
        <span>${{ shipping }}</span>
      </div>
      <div class="summary-row total">
        <span>Total:</span>
        <span>${{ total }}</span>
      </div>
      <button (click)="checkout()" class="btn btn-success btn-lg">Proceed to Checkout</button>
    </div>
  </div>
</div>
