<mat-card class="shipping-step">
  <div class="step-header">
    <mat-icon class="step-icon">local_shipping</mat-icon>
    <h2>Shipping Address</h2>
  </div>

  <form class="shipping-form">
    <mat-form-field appearance="outline">
      <mat-label>Full Name</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="name"
        name="name"
        (ngModelChange)="update()"
        required
        placeholder="John Doe"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Address Line 1</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="addressLine1"
        name="addressLine1"
        (ngModelChange)="update()"
        required
        placeholder="123 Main Street"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Address Line 2</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="addressLine2"
        name="addressLine2"
        (ngModelChange)="update()"
        placeholder="Apt, Suite, etc. (optional)"
      />
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>City</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="city"
          name="city"
          (ngModelChange)="update()"
          required
          placeholder="New York"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>State/Province</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="state"
          name="state"
          (ngModelChange)="update()"
          required
          placeholder="NY"
        />
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>ZIP/Postal Code</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="zip"
          name="zip"
          (ngModelChange)="update()"
          required
          placeholder="10001"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Country</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="country"
          name="country"
          (ngModelChange)="update()"
          required
          placeholder="United States"
        />
      </mat-form-field>
    </div>
  </form>
</mat-card>
